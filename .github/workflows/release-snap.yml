name: Release snap package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  release-snap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Install dependencies
        run: npm ci

      - name: Build snap package
        run: npm run icons && npx vite build && npx electron-builder --linux snap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Snap Store
        run: snapcraft upload --release=stable release/*.snap
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || inputs.tag }}
          name: Release ${{ github.event.inputs.tag || inputs.tag }}
          files: release/*.snap
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
